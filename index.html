<html>
    <head>
        <style>
            th, td {
                border: 1px solid #000000;
                padding: 12px 15px;
                text-align: center;
                vertical-align: middle;
            }

            .profile-preview {
                width: 64px;
                height: 64px;
                object-fit: cover;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <table id="data-table">
        <tr><th>Username</th><th>Email</th><th>Admin</th><th>Profile</th></tr>
        <tr><td>Webmaster</td><td>example@email.com</td><td><input type="checkbox" checked></td><td>No Image</td></tr>
        <tr><td>User123</td><td>example2@gmail.com</td><input type="checkbox" checked><td></td><td>No Image</td></tr>
        </table>
    <input type="text" id="input-username">Add username?
    <input type="text" id="input-email">Add email?
    <input type="checkbox" id="input-admin"> admin?
    <input type="file" id="input-image" accept="image/*">
    <button id="submit-data">Submit data :) ✨</button>
    <button id="empty-table">Empty table 🗑️</button>
    <script src="index.js"></script>
    </body>


</html>
